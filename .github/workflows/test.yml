name: Kohaku Loom Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Compile Python sources
        run: python -m compileall -q kohaku_loom scripts install.py tools
      - name: Run unit tests with skip budget
        run: python tools/test_runner.py --max-skips 20

  backend-coverage:
    name: Backend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Collect Python coverage
        run: |
          python -m coverage run --branch -m unittest discover -s tests
          python -m coverage report --fail-under=70
          python -m coverage xml -o coverage-python.xml
      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage-python.xml

  backend-kt-contract:
    name: KohakuTerrarium contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-kt-test.txt
      - name: Install contract-test dependencies
        run: python -m pip install -r requirements-kt-test.txt
      - name: Install Loom Terrarium package
        run: python -m kohakuterrarium install "$GITHUB_WORKSPACE" -e
        env:
          KT_CONFIG_DIR: ${{ github.workspace }}/.loom/config
          KT_SESSION_DIR: ${{ github.workspace }}/.loom/sessions
      - name: Run non-skippable contract suite
        run: python tools/test_runner.py --pattern test_loom_kt_contract.py --require-kt

  frontend:
    name: Frontend checks and coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Type and Svelte checks
        run: pnpm run check
      - name: Unit tests with coverage
        run: pnpm run test:coverage
      - name: Build generated browser bundle
        run: pnpm run build
      - name: Check bundle size budget
        run: pnpm run bundle:size
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  frontend-e2e:
    name: Frontend Chromium E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  browser-scripts:
    name: Browser script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check browser scripts
        run: for file in javascript/kohaku_loom*.js; do node --check "$file"; done
