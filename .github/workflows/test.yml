name: Prompt Agent Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate critical acceptance registry
        run: python tools/test_gate.py preflight --mode full
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'prompt_agent/**'
              - 'scripts/**'
              - 'install.py'
              - 'requirements.txt'
              - 'requirements-test.txt'
              - 'tests/**'
              - 'quality/**'
              - 'tools/test_gate.py'
              - '.github/workflows/test.yml'
            frontend:
              - 'frontend/**'
              - 'javascript/**'
              - 'quality/**'
              - 'tools/test_gate.py'
              - '.github/workflows/test.yml'

  backend:
    name: Backend Python ${{ matrix.python-version }}
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.ref == 'refs/heads/main'
      || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PRs: single version for speed. main / manual: full matrix.
        python-version: ${{ (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') && fromJSON('["3.11","3.12","3.13"]') || fromJSON('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Compile Python sources
        run: python -m compileall -q backend prompt_agent scripts install.py tests
      - name: Run unit tests with skip budget
        run: python tests/run_suite.py --max-skips 20
      - name: Coverage gate
        if: matrix.python-version == '3.12' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || needs.changes.outputs.backend == 'true')
        run: |
          python -m coverage run --branch -m unittest discover -s tests
          python -m coverage report --fail-under=70
          python -m coverage xml -o coverage-python.xml
      - name: Upload Python coverage
        if: matrix.python-version == '3.12' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage-python.xml

  frontend:
    name: Frontend checks and build
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.ref == 'refs/heads/main'
      || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Type and Svelte checks
        run: pnpm run check
      - name: Unit tests
        run: pnpm run test
      - name: Unit tests with coverage
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: pnpm run test:coverage
      - name: Build generated browser bundle
        run: pnpm run build
      - name: Check bundle size budget
        run: pnpm run bundle:size
      - name: Check browser scripts
        working-directory: .
        run: for file in javascript/prompt_agent*.js; do node --check "$file"; done
      - name: Upload frontend coverage
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore

  frontend-e2e:
    name: Frontend Chromium E2E
    needs: changes
    # Heavy: main, manual, or frontend-touching PRs only.
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.ref == 'refs/heads/main'
      || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  # Single required check for branch protection. Skipped partial jobs are OK;
  # any executed job that failed or was cancelled fails the gate.
  ci-ok:
    name: CI OK
    needs: [changes, backend, frontend, frontend-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate partial results
        run: |
          backend="${{ needs.backend.result }}"
          frontend="${{ needs.frontend.result }}"
          e2e="${{ needs.frontend-e2e.result }}"
          echo "backend=$backend frontend=$frontend e2e=$e2e"
          for result in "$backend" "$frontend" "$e2e"; do
            case "$result" in
              success|skipped) ;;
              *)
                echo "Failing gate because a required job result was: $result"
                exit 1
                ;;
            esac
          done
